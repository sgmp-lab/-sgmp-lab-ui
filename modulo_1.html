<!DOCTYPE html> <html lang="es"> <head> <meta charset="UTF-8"> <title>SGMP · LMP · Análisis por etapas</title> <style> body { font-family: Arial; margin:0; display:flex; } .sidebar { width:260px; background:#1e3a5f; color:white; padding:15px; } .sidebar button { width:100%; margin:6px 0; padding:10px; border:none; background:#2f5c8a; color:white; cursor:pointer; } .sidebar button.active { background:#0ea5e9; } .main { flex:1; padding:20px; } .panel { display:none; } .panel.active { display:block; } textarea { width:100%; height:120px; margin:5px 0; } .btn { padding:8px 12px; margin:5px; cursor:pointer; border:none; color:white; } .run { background:#16a34a; } .copy { background:#1d4ed8; } </style> </head> <body> <div class="sidebar"> <button onclick="show('b1')">B1 · Validación AS IS</button> <button onclick="show('b2')">B2 · AVA</button> <button onclick="show('b3')">B3 · Desperdicios</button> <button onclick="show('b4')">B4 · Restricciones</button> <button onclick="show('b5')">B5 · Mejoras</button> <button onclick="show('b6')">B6 · Builder</button> </div> <div class="main"> <!-- TEMPLATE GENERICO --> <script> const state = { b1:null, b2:null, b3:null, b4:null, b5:null, b6:null }; function show(id){ document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active')); document.getElementById(id).classList.add('active'); } async function run(stage){ const prompt = document.getElementById(prompt_${stage}).value; try{ const res = await fetch("https://api.openai.com/v1/chat/completions",{ method:"POST", headers:{ "Content-Type":"application/json", "Authorization":"Bearer TU_API_KEY" }, body:JSON.stringify({ model:"gpt-4o-mini", messages:[{role:"user",content:prompt}] }) }); const data = await res.json(); const text = data.choices[0].message.content; document.getElementById(response_${stage}).value = text; state[stage] = text; }catch(e){ alert("Fallo API. Usa modo manual."); } } function copy(id){ const el = document.getElementById(id); el.select(); document.execCommand("copy"); } </script> <!-- B1 --> <div id="b1" class="panel active"> <h2>B1 · Validación AS IS</h2> <textarea id="prompt_b1">PROMPT B1...</textarea> <button class="btn run" onclick="run('b1')">Ejecutar IA</button> <button class="btn copy" onclick="copy('prompt_b1')">Copiar Prompt</button> <textarea id="response_b1" placeholder="Respuesta IA"></textarea> <button class="btn copy" onclick="copy('response_b1')">Copiar Respuesta</button> </div> <!-- B2 --> <div id="b2" class="panel"> <h2>B2 · AVA</h2> <textarea id="prompt_b2">PROMPT B2 (usa B1)...</textarea> <button class="btn run" onclick="run('b2')">Ejecutar IA</button> <button class="btn copy" onclick="copy('prompt_b2')">Copiar Prompt</button> <textarea id="response_b2"></textarea> <button class="btn copy" onclick="copy('response_b2')">Copiar Respuesta</button> </div> <!-- B3 --> <div id="b3" class="panel"> <h2>B3 · Desperdicios</h2> <textarea id="prompt_b3"></textarea> <button class="btn run" onclick="run('b3')">Ejecutar IA</button> <button class="btn copy" onclick="copy('prompt_b3')">Copiar Prompt</button> <textarea id="response_b3"></textarea> <button class="btn copy" onclick="copy('response_b3')">Copiar Respuesta</button> </div> <!-- B4 --> <div id="b4" class="panel"> <h2>B4 · Restricciones</h2> <textarea id="prompt_b4"></textarea> <button class="btn run" onclick="run('b4')">Ejecutar IA</button> <button class="btn copy" onclick="copy('prompt_b4')">Copiar Prompt</button> <textarea id="response_b4"></textarea> <button class="btn copy" onclick="copy('response_b4')">Copiar Respuesta</button> </div> <!-- B5 --> <div id="b5" class="panel"> <h2>B5 · Mejoras</h2> <textarea id="prompt_b5"></textarea> <button class="btn run" onclick="run('b5')">Ejecutar IA</button> <button class="btn copy" onclick="copy('prompt_b5')">Copiar Prompt</button> <textarea id="response_b5"></textarea> <button class="btn copy" onclick="copy('response_b5')">Copiar Respuesta</button> </div> <!-- B6 --> <div id="b6" class="panel"> <h2>B6 · Builder SIPOC</h2> <textarea id="prompt_b6"></textarea> <button class="btn run" onclick="run('b6')">Ejecutar IA</button> <button class="btn copy" onclick="copy('prompt_b6')">Copiar Prompt</button> <textarea id="response_b6"></textarea> <button class="btn copy" onclick="copy('response_b6')">Copiar Respuesta</button> </div> </div> </body> </html>
