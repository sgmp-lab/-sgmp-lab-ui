<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>LMP · Laboratorio de Procesos</title>

<style>

/* ========================================================= */
/* CORE VARIABLES */
/* ========================================================= */

:root{

  --bg:#EEF3F9;
  --bg2:#E7EEF7;

  --panel:#FFFFFF;
  --panel2:#F8FBFF;

  --line:rgba(11,46,89,.12);
  --lineSoft:rgba(11,46,89,.08);

  --text:#0A1F44;
  --muted:#5B6F8A;

  --primary:#0B2E59;
  --primary2:#1A56DB;

  --primarySoft:rgba(0,194,255,.10);

  --ok:#27AE60;
  --okSoft:rgba(39,174,96,.10);

  --warn:#F2994A;
  --warnSoft:rgba(242,153,74,.12);

  --danger:#C0392B;
  --dangerSoft:rgba(192,57,43,.10);

  --shadow:0 18px 42px rgba(11,46,89,.10);

  --radiusXL:26px;
  --radiusLG:18px;
  --radiusMD:14px;

  --contentW:min(1500px, calc(100vw - 32px));

}

/* ========================================================= */
/* RESET */
/* ========================================================= */

*{
  box-sizing:border-box;
}

html,
body{
  margin:0;
  padding:0;
}

body{

  font-family:"Segoe UI", Inter, Arial, sans-serif;

  background:
    radial-gradient(circle at 12% 0%, rgba(0,194,255,.12), transparent 24%),
    radial-gradient(circle at 92% 10%, rgba(26,86,219,.10), transparent 24%),
    linear-gradient(180deg,#EEF3F9 0%,#E7EEF7 100%);

  color:var(--text);

  min-height:100vh;

}

/* ========================================================= */
/* APP */
/* ========================================================= */

.app{
  width:var(--contentW);
  margin:14px auto 24px;
}

/* ========================================================= */
/* HERO */
/* ========================================================= */

.hero{

  display:grid;
  grid-template-columns:1.5fr auto;

  gap:18px;

  align-items:center;

  background:
    linear-gradient(
      135deg,
      #071C36 0%,
      #0B2E59 54%,
      #173F73 100%
    );

  border:1px solid rgba(255,255,255,.10);

  border-radius:28px;

  box-shadow:0 20px 50px rgba(7,28,54,.22);

  padding:24px;

}

.hero h1{

  margin:0 0 10px;

  font-size:clamp(1.45rem,2.4vw,2rem);

  font-weight:850;

  color:#FFFFFF;

}

.hero p{

  margin:0;

  color:rgba(255,255,255,.82);

  font-size:.97rem;

  line-height:1.55;

  max-width:980px;

}

.hero-actions{

  display:flex;

  gap:10px;

  flex-wrap:wrap;

  justify-content:flex-end;

}

/* ========================================================= */
/* BUTTONS */
/* ========================================================= */

.top-chip,
.top-btn,
.btn,
.btn-ghost,
.btn-ok,
.btn-danger,
.btn-warn{

  border:none;

  border-radius:14px;

  padding:11px 16px;

  cursor:pointer;

  font:inherit;

  font-weight:800;

  transition:.18s ease;

}

.top-chip{

  background:rgba(0,194,255,.12);

  color:#0B2E59;

  border:1px solid rgba(0,194,255,.22);

}

.top-btn{

  background:#FFFFFF;

  color:#0B2E59;

  border:1px solid rgba(11,46,89,.12);

  box-shadow:0 8px 18px rgba(11,46,89,.06);

}

.btn{

  background:
    linear-gradient(
      135deg,
      #0B2E59,
      #1A56DB
    );

  color:#FFFFFF;

}

.btn-ok{

  background:
    linear-gradient(
      135deg,
      #0F766E,
      #27AE60
    );

  color:#FFFFFF;

}

.btn-danger{

  background:
    linear-gradient(
      135deg,
      #A93226,
      #C0392B
    );

  color:#FFFFFF;

}

.btn-warn{

  background:
    linear-gradient(
      135deg,
      #D97706,
      #F2994A
    );

  color:#FFFFFF;

}

.btn-ghost{

  background:#FFFFFF;

  color:#0B2E59;

  border:1px solid rgba(11,46,89,.14);

}

.top-btn:hover,
.btn:hover,
.btn-ok:hover,
.btn-danger:hover,
.btn-warn:hover,
.btn-ghost:hover{

  transform:translateY(-1px);

  box-shadow:0 12px 26px rgba(11,46,89,.13);

}

/* ========================================================= */
/* STATUS */
/* ========================================================= */

.status-bar{

  margin-top:14px;

  background:rgba(255,255,255,.78);

  border:1px solid rgba(11,46,89,.08);

  border-radius:16px;

  padding:12px 14px;

  color:#5B6F8A;

  font-size:.93rem;

  box-shadow:0 10px 26px rgba(11,46,89,.06);

}

.status-bar strong{
  color:#0B2E59;
}

/* ========================================================= */
/* LAYOUT */
/* ========================================================= */

.layout{

  display:grid;

  grid-template-columns:300px 1fr;

  gap:18px;

  margin-top:18px;

}

/* ========================================================= */
/* SIDEBAR + WORKSPACE */
/* ========================================================= */

.sidebar,
.workspace{

  background:rgba(255,255,255,.82);

  border:1px solid rgba(11,46,89,.08);

  border-radius:var(--radiusXL);

  box-shadow:0 18px 42px rgba(11,46,89,.09);

  backdrop-filter:blur(10px);

}

.sidebar{

  padding:16px;

  position:sticky;

  top:16px;

  height:fit-content;

}

.workspace{
  padding:18px;
}

.sidebar-title{

  font-size:.95rem;

  font-weight:800;

  letter-spacing:.01em;

  margin:4px 0 14px;

  color:#0A1F44;

}

/* ========================================================= */
/* STEP BUTTONS */
/* ========================================================= */

.step-list,
.summary-list{

  display:flex;

  flex-direction:column;

  gap:10px;

}

.step-btn,
.summary-card{

  width:100%;

  text-align:left;

  background:#FFFFFF;

  border:1px solid rgba(11,46,89,.08);

  color:#5B6F8A;

  border-radius:18px;

  padding:14px;

  box-shadow:0 6px 16px rgba(11,46,89,.045);

}

.step-btn{

  cursor:pointer;

  transition:.18s ease;

  border-left:3px solid transparent;

}

.step-btn:hover{

  color:#0B2E59;

  border-color:rgba(0,194,255,.25);

  border-left-color:#00C2FF;

  background:
    linear-gradient(
      90deg,
      rgba(0,194,255,.08),
      #FFFFFF 42%
    );

}

.step-btn.active{

  color:#0B2E59;

  border-color:rgba(0,194,255,.30);

  border-left-color:#00C2FF;

  background:
    linear-gradient(
      90deg,
      rgba(0,194,255,.14),
      #FFFFFF 46%
    );

  box-shadow:0 12px 28px rgba(0,194,255,.10);

}

/* ========================================================= */
/* SECTIONS */
/* ========================================================= */

.section{
  display:none;
}

.section.active{
  display:block;
}

.section-head{

  display:flex;

  justify-content:space-between;

  gap:16px;

  align-items:flex-start;

  margin-bottom:16px;

  padding:4px 2px 10px;

  border-bottom:1px solid rgba(11,46,89,.08);

}

.section-head h2{

  margin:0 0 6px;

  font-size:1.3rem;

  font-weight:800;

  color:#0A1F44;

}

.section-head p{

  margin:0;

  color:#5B6F8A;

  font-size:.95rem;

  line-height:1.5;

  max-width:920px;

}

/* ========================================================= */
/* CARDS */
/* ========================================================= */

.cards{

  display:grid;

  grid-template-columns:repeat(12,1fr);

  gap:14px;

}

.card{

  grid-column:span 12;

  background:#FFFFFF;

  border:1px solid rgba(11,46,89,.08);

  border-radius:22px;

  padding:18px;

  box-shadow:0 10px 24px rgba(11,46,89,.055);

}

.card h3{

  margin:0 0 8px;

  font-size:1rem;

  color:#0A1F44;

}

.card p{

  margin:0;

  color:#5B6F8A;

  line-height:1.5;

  font-size:.93rem;

}

/* ========================================================= */
/* FIELDS */
/* ========================================================= */

.field-grid{

  display:grid;

  grid-template-columns:repeat(12,1fr);

  gap:12px;

  margin-top:12px;

}

.field{

  grid-column:span 12;

  display:flex;

  flex-direction:column;

  gap:7px;

}

.field label{

  font-size:.84rem;

  font-weight:800;

  color:#42617F;

}

.field input,
.field textarea,
.field select{

  width:100%;

  background:#FFFFFF;

  color:#0A1F44;

  border:1px solid rgba(11,46,89,.14);

  border-radius:14px;

  padding:12px 13px;

  outline:none;

}

.field textarea{

  min-height:108px;

  resize:vertical;

}

.field input:focus,
.field textarea:focus,
.field select:focus{

  border-color:rgba(0,194,255,.55);

  box-shadow:0 0 0 4px rgba(0,194,255,.12);

}

/* ========================================================= */
/* TABS */
/* ========================================================= */

.tabs{

  display:flex;

  gap:12px;

  flex-wrap:wrap;

  margin-top:12px;

}

.tab-btn{

  border:none;

  border-radius:14px;

  padding:10px 14px;

  background:#FFFFFF;

  color:#0B2E59;

  border:1px solid rgba(11,46,89,.12);

  cursor:pointer;

  font:inherit;

  font-weight:800;

  box-shadow:0 6px 16px rgba(11,46,89,.05);

}

.tab-btn.active{

  background:
    linear-gradient(
      135deg,
      #0B2E59,
      #1A56DB
    );

  color:#FFFFFF;

}

/* ========================================================= */
/* PRE / BOX */
/* ========================================================= */

.pre,
.box{

  background:
    linear-gradient(
      180deg,
      #071C36,
      #0B2E59
    );

  color:#DDF5FF;

  border-radius:14px;

  padding:14px;

  border:1px solid rgba(0,194,255,.18);

}

/* ========================================================= */
/* SCROLLS */
/* ========================================================= */

*::-webkit-scrollbar{
  width:10px;
}

*::-webkit-scrollbar-track{

  background:rgba(11,46,89,.08);

  border-radius:999px;

}

*::-webkit-scrollbar-thumb{

  background:rgba(11,46,89,.24);

  border-radius:999px;

}

/* ========================================================= */
/* BRIEF COMPACT */
/* ========================================================= */

#briefGapsList{

  min-height:unset!important;

  max-height:300px!important;

  overflow-y:auto!important;

  padding:8px!important;

}

/* ========================================================= */
/* RESPONSIVE */
/* ========================================================= */

@media (max-width:1220px){

  .layout{
    grid-template-columns:1fr;
  }

  .sidebar{
    position:relative;
    top:0;
  }

}

@media (max-width:920px){

  .hero{
    grid-template-columns:1fr;
  }

}

/* ========================================================= */
/* FIN CSS HIBRIDO */
/* ========================================================= */

</style>

</head>

<body>

</body>

</html>
